<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <!--Aqui contem a logo e uma barra de buscar para consulta-->
    
    <img id="logo" src="imgs/logo.png">
    <label>Buscar</label>
    <input type="text" id="buscador">
    
    <h2>Comédia</h2>

       <!--2 classes chamadas "divisão" onde em ambas as classes terão uma classe filha "filme"-->

    <div class="divisao">
        <div class="filmes">
            <img src="/imgs/com_img1.png" alt="Filme de Comédia 1">
            <p>As Branquelas</p>
        </div>
        <div class="filmes">
            <img src="/imgs/com_img2.png" alt="Filme de Comédia 2">
            <p>Debi e Lóide</p>
        </div>
        <div class="filmes">
            <img src="/imgs/com_img3.png" alt="Filme de Comédia 3">
            <p>o auto da Compadecida</p>
        </div>
    </div>
    <h2>Terror</h2>
    <!--segunda Classe "divisão" onde terão os filmes de terror em uma div filha de "divisão" vai conter os filmes-->
    <div class="divisao">
        <div class="filmes">
            <img src="/imgs/terror_img1.png" alt="Filme de terror 1">
            <p>Boneco do mal</p>
        </div>
        <div class="filmes">
            <img src="/imgs/terror_img2.png" alt="Filme de terror 2">
            <p>Sobrenatural</p>
        </div>
        <div class="filmes">
            <img src="/imgs/terror_img3.png" alt="Filme de terror 3">
            <p>A hora do pesadelo</p>
        </div>
    </div>
    
</body>
</html>
